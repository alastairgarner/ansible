[defaults]
inventory = inventory.ini
# We only ever target Fedora's system Python; skip the discovery warning.
interpreter_python = auto_silent
host_key_checking = False
retry_files_enabled = False
# YAML-formatted output via the built-in default callback. (The old
# community.general.yaml callback was removed in community.general 12.0.0.)
result_format = yaml
nocows = True

[privilege_escalation]
become = False
